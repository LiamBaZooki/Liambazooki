<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LiamBaZooki | Official Hub</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Assistant:wght@400;700;800&family=Inter:wght@900&display=swap" rel="stylesheet">
    <style>
        :root {
            --kick-color: #53fc18;    
            --youtube-color: #ff0000; 
            --discord-color: #5865F2; 
            --twitch-color: #9146ff;
            --bg-dark: #080808;
            --soft-neon: rgba(83, 252, 24, 0.4);
        }

        /* --- אנימציית כניסה (Fade In) --- */
        @keyframes fadeInEntryPoint {
            from {
                opacity: 0;
                transform: translateY(20px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .fade-in-section {
            animation: fadeInEntryPoint 0.8s ease-out forwards;
        }

        /* --- אנימציית סיבוב 3D לאייקונים --- */
        .icon-box {
            width: 45px; height: 45px;
            display: flex; align-items: center; justify-content: center;
            perspective: 1000px;
            transition: transform 0.7s cubic-bezier(0.4, 0, 0.2, 1);
            transform-style: preserve-3d;
            margin-left: 15px;
        }

        .link-card:hover .icon-box {
            transform: rotateY(360deg);
        }

        .kick-icon-img {
            width: 32px;
            height: 32px;
            object-fit: contain;
            border-radius: 4px;
        }

        /* --- עיצוב כללי --- */
        body {
            font-family: 'Assistant', sans-serif;
            background: var(--bg-dark);
            color: #fff;
            margin: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            overflow: hidden;
        }

        /* רשת רקע נעה */
        .bg-grid {
            position: fixed;
            width: 200%; height: 200%;
            background-image: linear-gradient(rgba(255,255,255,0.02) 1px, transparent 1px),
                              linear-gradient(90deg, rgba(255,255,255,0.02) 1px, transparent 1px);
            background-size: 50px 50px;
            z-index: -1;
            transform: perspective(500px) rotateX(60deg);
            animation: grid-move 20s linear infinite;
        }
        @keyframes grid-move { from { background-position: 0 0; } to { background-position: 0 50px; } }

        .main-container {
            width: 90%; max-width: 380px;
            text-align: center;
        }

        /* --- פרופיל עם נאון ירוק חלש --- */
        .profile-wrapper {
            width: 110px; height: 110px;
            margin: 0 auto 20px;
            position: relative;
            border-radius: 50%;
            box-shadow: 0 0 15px var(--soft-neon);
            border: 2px solid rgba(83, 252, 24, 0.3);
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 3px;
        }

        .profile-img {
            width: 100%; height: 100%;
            object-fit: cover;
            border-radius: 50%;
        }

        h1 { font-size: 32px; font-weight: 800; margin: 0; }
        .subtitle { font-size: 11px; letter-spacing: 4px; opacity: 0.5; text-transform: uppercase; margin-bottom: 30px; }

        /* כרטיסים */
        .links-container { display: flex; flex-direction: column; gap: 14px; }

        .link-card {
            background: rgba(255,255,255,0.03);
            border: 1px solid rgba(255,255,255,0.08);
            padding: 14px 20px;
            border-radius: 16px;
            display: flex; align-items: center;
            text-decoration: none; color: #fff;
            transition: 0.3s;
            position: relative;
        }

        .link-card:hover {
            background: rgba(255,255,255,0.08);
            transform: scale(1.03);
            border-color: rgba(255,255,255,0.2);
        }

        .link-text { flex-grow: 1; text-align: right; font-weight: 700; font-size: 18px; letter-spacing: 1px; }

        /* פס צד צבעוני ב-Hover */
        .link-card::before {
            content: ""; position: absolute; left: 0; width: 4px; height: 0;
            transition: 0.3s; border-radius: 0 10px 10px 0;
        }
        .link-card:hover::before { height: 50%; }
        .kick-card:hover::before { background: var(--kick-color); box-shadow: 0 0 10px var(--kick-color); }
        .twitch-card:hover::before { background: var(--twitch-color); box-shadow: 0 0 10px var(--twitch-color); }
        .youtube-card:hover::before { background: var(--youtube-color); box-shadow: 0 0 10px var(--youtube-color); }
        .discord-card:hover::before { background: var(--discord-color); box-shadow: 0 0 10px var(--discord-color); }

    </style>
</head>
<body>

    <div class="bg-grid"></div>

    <div class="main-container fade-in-section">
        <div class="profile-wrapper">
            <img src="https://encrypted-tbn1.gstatic.com/images?q=tbn:ANd9GcSciIHG3CjGRxsSjskYusSCn5_C7wMrS6x_IB_sb1M5WAjBgRTg" alt="Liam" class="profile-img">
        </div>
        
        <h1>LiamBaZooki</h1>
        <div class="subtitle">Official Links</div>

        <div class="links-container">
            <a href="https://kick.com/liambazooki" target="_blank" class="link-card kick-card">
                <div class="icon-box">
                    <img src="https://pnghdpro.com/wp-content/themes/pnghdpro/download/social-media-and-brands/kick-app-icon.png" alt="Kick" class="kick-icon-img">
                </div>
                <span class="link-text">KICK</span>
            </a>

            <a href="https://www.twitch.tv/liambazooki" target="_blank" class="link-card twitch-card">
                <div class="icon-box" style="color: var(--twitch-color);">
                    <i class="fab fa-twitch" style="font-size: 28px;"></i>
                </div>
                <span class="link-text">TWITCH</span>
            </a>

            <a href="https://www.youtube.com/@Ba-Zooki" target="_blank" class="link-card youtube-card">
                <div class="icon-box" style="color: var(--youtube-color);">
                    <i class="fab fa-youtube" style="font-size: 28px;"></i>
                </div>
                <span class="link-text">YOUTUBE</span>
            </a>

            <a href="https://discord.gg/6aH6RC73KE" target="_blank" class="link-card discord-card">
                <div class="icon-box" style="color: var(--discord-color);">
                    <i class="fab fa-discord" style="font-size: 28px;"></i>
                </div>
                <span class="link-text">DISCORD</span>
            </a>
        </div>
    </div>

</body>
</html>
